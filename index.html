<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>종가매매 체크리스트</title>
    <style>
      :root {
        --bg: #eef3f8;
        --surface: #ffffff;
        --soft: #f7fafc;
        --ink: #111827;
        --muted: #64748b;
        --line: #d8e1ec;
        --blue: #2563eb;
        --green: #059669;
        --red: #dc2626;
        --amber: #d97706;
        --shadow: 0 18px 40px rgba(15, 23, 42, 0.1);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family:
          "Pretendard",
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background:
          linear-gradient(180deg, rgba(37, 99, 235, 0.08), transparent 260px),
          var(--bg);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .app {
        width: min(100%, 440px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 14px calc(96px + var(--safe-bottom));
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .kicker {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        font-size: 1.45rem;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .date-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        position: relative;
        margin-top: 16px;
      }

      .date-move,
      .date-picker-button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: #334155;
        font-weight: 950;
        cursor: pointer;
      }

      .date-move {
        width: 42px;
        font-size: 1rem;
      }

      .date-picker-button {
        min-width: 148px;
        padding: 0 18px;
        color: var(--ink);
        font-size: 1rem;
      }

      .date-picker-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .stock-title-name {
        color: var(--blue);
        font-size: 0.88rem;
        font-weight: 950;
      }

      .stock-switcher {
        display: grid;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }

      .stock-switcher[hidden] {
        display: none;
      }

      .stock-switch-label {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .stock-switch-chips {
        display: flex;
        gap: 7px;
        overflow-x: auto;
      }

      .stock-switch-chip {
        flex: 0 0 auto;
        min-height: 32px;
        padding: 0 11px;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        color: #334155;
        background: #fff;
        font-size: 0.78rem;
        font-weight: 950;
        white-space: nowrap;
      }

      .stock-switch-chip.is-active {
        color: #fff;
        border-color: var(--blue);
        background: var(--blue);
      }

      .date-picker-input {
        border: 0;
        outline: none;
        background: transparent;
      }

      .panel,
      .summary {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .summary {
        padding: 16px;
      }

      .summary-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .summary-title {
        font-size: 1.08rem;
        line-height: 1.25;
      }

      .status-badge {
        flex: 0 0 auto;
        padding: 7px 10px;
        border-radius: 999px;
        color: #1e3a8a;
        background: #dbeafe;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .meter {
        height: 12px;
        margin-top: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: #e5edf5;
      }

      .meter-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--blue);
        transition: width 0.22s ease;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
      }

      .metric {
        min-height: 68px;
        padding: 10px;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: var(--soft);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 800;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 1rem;
        line-height: 1.15;
      }

      .panel {
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--soft);
      }

      .panel-head h2 {
        font-size: 1.04rem;
      }

      .panel-sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.35;
      }

      .panel-body {
        padding: 14px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        min-height: 46px;
        padding: 11px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        outline: none;
        color: var(--ink);
        background: #fff;
      }

      .field textarea {
        min-height: 86px;
        resize: vertical;
        line-height: 1.5;
      }

      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: rgba(37, 99, 235, 0.7);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      .symbol-field {
        position: relative;
      }

      .selected-stock {
        color: var(--blue);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .stock-suggestions {
        position: absolute;
        z-index: 20;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        overflow: hidden;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 18px 30px rgba(15, 23, 42, 0.16);
      }

      .stock-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        min-height: 46px;
        padding: 9px 12px;
        border: 0;
        border-bottom: 1px solid #e2e8f0;
        background: #fff;
        color: var(--ink);
        text-align: left;
      }

      .stock-option:last-child {
        border-bottom: 0;
      }

      .stock-option:active,
      .stock-option:hover {
        background: #eff6ff;
      }

      .stock-name {
        font-size: 0.86rem;
        font-weight: 900;
      }

      .stock-code {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 900;
      }

      .chip-row {
        display: flex;
        gap: 7px;
        overflow-x: auto;
        padding-top: 10px;
      }

      .chip {
        flex: 0 0 auto;
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        color: #334155;
        background: #fff;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .small-action {
        flex: 0 0 auto;
        min-width: 62px;
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        color: #334155;
        background: #fff;
        font-size: 0.78rem;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .file-action {
        min-height: 42px;
        padding: 0 8px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        color: #334155;
        background: #fff;
        font-size: 0.76rem;
        font-weight: 950;
        line-height: 1;
        white-space: nowrap;
      }

      .file-action.primary {
        color: #fff;
        border-color: var(--blue);
        background: var(--blue);
      }

      .table-wrap {
        overflow-x: hidden;
        border-top: 1px solid var(--line);
      }

      .check-table {
        width: 100%;
        min-width: 0;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .check-table th,
      .check-table td {
        border-bottom: 1px solid var(--line);
        border-right: 1px solid var(--line);
        padding: 9px 4px;
        text-align: center;
        vertical-align: middle;
        word-break: keep-all;
      }

      .check-table th:last-child,
      .check-table td:last-child {
        border-right: 0;
      }

      .check-table thead th {
        background: #f8fafc;
        color: #334155;
        font-size: 0.84rem;
        font-weight: 900;
      }

      .group-cell {
        width: 44px;
        color: #0f172a;
        background: #f8fafc;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .category-cell {
        width: 78px;
        color: #334155;
        background: #fbfdff;
        font-size: 0.78rem;
        font-weight: 900;
        line-height: 1.25;
        white-space: pre-line;
      }

      .content-cell {
        text-align: left;
        line-height: 1.38;
      }

      .content-main {
        display: block;
        font-size: 0.78rem;
        font-weight: 850;
      }

      .status-button,
      .note-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        min-height: 36px;
        border: 1px solid #cbd5e1;
        border-radius: 11px;
        background: #fff;
        color: #64748b;
        font-size: 0.78rem;
        font-weight: 950;
      }

      .status-button.is-ok {
        border-color: rgba(5, 150, 105, 0.35);
        color: #fff;
        background: var(--green);
      }

      .status-button.is-no {
        border-color: rgba(220, 38, 38, 0.35);
        color: #fff;
        background: var(--red);
      }

      .status-button.is-empty {
        border-color: rgba(37, 99, 235, 0.5);
        animation: empty-status-pulse 1.1s ease-in-out infinite;
      }

      @keyframes empty-status-pulse {
        0%,
        100% {
          background: #fff;
          box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
        }

        50% {
          background: #dbeafe;
          box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.16);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .status-button.is-empty {
          animation: none;
          background: #dbeafe;
        }
      }

      .note-button {
        width: 40px;
      }

      .note-button.has-note {
        color: #fff;
        border-color: var(--amber);
        background: var(--amber);
      }

      .decision-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .decision-button {
        min-height: 48px;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        color: #334155;
        background: #fff;
        font-weight: 950;
      }

      .decision-button.is-active {
        color: #fff;
        border-color: var(--blue);
        background: var(--blue);
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: max(12px, calc(10px + var(--safe-bottom)));
        transform: translateX(-50%);
        width: min(calc(100% - 24px), 410px);
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        background: rgba(17, 24, 39, 0.94);
        box-shadow: 0 22px 44px rgba(15, 23, 42, 0.28);
      }

      .nav-btn {
        min-height: 44px;
        border: 0;
        border-radius: 15px;
        color: rgba(255, 255, 255, 0.68);
        background: transparent;
        font-size: 0.76rem;
        font-weight: 950;
      }

      .nav-btn.is-active {
        color: #fff;
        background: rgba(255, 255, 255, 0.14);
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: flex-end;
        justify-content: center;
        padding: 14px;
        background: rgba(15, 23, 42, 0.42);
      }

      .modal.is-active {
        display: flex;
      }

      .modal-card {
        width: min(100%, 420px);
        padding: 18px;
        border-radius: 22px;
        background: #fff;
        box-shadow: 0 22px 48px rgba(15, 23, 42, 0.28);
      }

      .modal-card h2 {
        font-size: 1.08rem;
      }

      .modal-card p {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .modal-card textarea {
        width: 100%;
        min-height: 132px;
        margin-top: 14px;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        outline: none;
        resize: vertical;
        line-height: 1.5;
      }

      .modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .modal-actions button {
        min-height: 44px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        color: #334155;
        font-weight: 950;
      }

      .modal-actions .primary {
        color: #fff;
        border-color: var(--blue);
        background: var(--blue);
      }

      .modal-actions .danger {
        color: var(--red);
      }

      @media (max-width: 380px) {
        .field-grid {
          grid-template-columns: 1fr;
        }

        .check-table {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <p class="kicker">End-of-Day Trading Checklist</p>
          <h1>종가매매 체크리스트</h1>
        </div>
      </header>

      <main>
        <div class="date-nav" aria-label="점검일 이동">
          <button class="date-move" id="prevDateButton" type="button" aria-label="전일로 이동">◀</button>
          <button class="date-picker-button" id="topDateLabel" type="button">2026.05.14</button>
          <button class="date-move" id="nextDateButton" type="button" aria-label="다음일로 이동">▶</button>
          <input class="date-picker-input" id="topDateInput" type="date" aria-label="점검일 선택" />
        </div>

        <section class="panel" id="marketSummary">
          <div class="panel-head">
            <div>
              <h2>오늘의 시장 요약</h2>
            </div>
          </div>
          <div class="panel-body">
            <div class="field">
              <label for="dayMemo">시장 요약</label>
              <textarea id="dayMemo"></textarea>
            </div>
          </div>
        </section>

        <section class="panel" id="basic">
          <div class="panel-head">
            <div>
              <h2>기본 설정</h2>
            </div>
            <button class="small-action" id="resetButton" type="button">초기화</button>
          </div>
          <div class="panel-body">
            <div class="field-grid">
              <div class="field full symbol-field">
                <label for="symbolInput">종목명</label>
                <input id="symbolInput" type="text" placeholder="예: 삼성전자 또는 005930" autocomplete="off" />
                <div class="selected-stock" id="selectedStockLabel" hidden></div>
                <div class="stock-suggestions" id="stockSuggestions" hidden></div>
              </div>
            </div>
            <div class="chip-row" id="symbolChips" aria-label="최근 종목"></div>
            <div class="action-grid" aria-label="파일 저장 및 불러오기">
              <button class="file-action" id="jsonBackupButton" type="button">JSON 백업</button>
              <button class="file-action" id="jsonImportButton" type="button">JSON 불러오기</button>
              <button class="file-action primary" id="excelExportButton" type="button">엑셀 저장</button>
              <input id="jsonImportInput" type="file" accept=".json,application/json" hidden />
            </div>
          </div>
        </section>

        <section class="panel" id="indexChecklist">
          <div class="panel-head">
            <div>
              <h2>지수 체크리스트</h2>
            </div>
            <button class="small-action" id="resetIndexButton" type="button">초기화</button>
          </div>
          <div class="table-wrap">
            <table class="check-table" aria-label="지수 체크리스트">
              <colgroup>
                <col style="width: 12%" />
                <col style="width: 21%" />
                <col style="width: 39%" />
                <col style="width: 14%" />
                <col style="width: 14%" />
              </colgroup>
              <thead>
                <tr>
                  <th colspan="2">구분</th>
                  <th>내용</th>
                  <th>확인</th>
                  <th>비고</th>
                </tr>
              </thead>
              <tbody id="indexTableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel" id="stockChecklist">
          <div class="panel-head">
            <div>
              <h2>종목 체크리스트 <span class="stock-title-name" id="stockTitleName"></span></h2>
            </div>
            <button class="small-action" id="resetStockButton" type="button">초기화</button>
          </div>
          <div class="stock-switcher" id="stockSwitcher" hidden>
            <div class="stock-switch-label">작성 종목</div>
            <div class="stock-switch-chips" id="stockSwitchChips"></div>
          </div>
          <div class="table-wrap">
            <table class="check-table" aria-label="종목 체크리스트">
              <colgroup>
                <col style="width: 12%" />
                <col style="width: 21%" />
                <col style="width: 39%" />
                <col style="width: 14%" />
                <col style="width: 14%" />
              </colgroup>
              <thead>
                <tr>
                  <th colspan="2">구분</th>
                  <th>내용</th>
                  <th>확인</th>
                  <th>비고</th>
                </tr>
              </thead>
              <tbody id="stockTableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel" id="decision">
          <div class="panel-head">
            <div>
              <h2>최종 판단</h2>
            </div>
          </div>
          <div class="panel-body">
            <div class="decision-grid" role="group" aria-label="최종 판단">
              <button class="decision-button" type="button" data-decision="매수 가능">매수 가능</button>
              <button class="decision-button" type="button" data-decision="보류">보류</button>
              <button class="decision-button" type="button" data-decision="금지">금지</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <nav class="bottom-nav" aria-label="빠른 이동">
      <button class="nav-btn is-active" type="button" data-target="marketSummary">요약</button>
      <button class="nav-btn" type="button" data-target="indexChecklist">지수</button>
      <button class="nav-btn" type="button" data-target="stockChecklist">종목</button>
      <button class="nav-btn" type="button" data-target="decision">판단</button>
    </nav>

    <div class="modal" id="noteModal" role="dialog" aria-modal="true" aria-labelledby="noteModalTitle">
      <div class="modal-card">
        <h2 id="noteModalTitle">비고 입력</h2>
        <p id="noteModalDesc">항목별로 확인한 근거를 적어두세요.</p>
        <textarea id="noteInput" placeholder="예: 수급 수치, 뉴스 출처, 차트 확인 내용"></textarea>
        <div class="modal-actions">
          <button class="danger" id="deleteNoteButton" type="button">삭제</button>
          <button id="cancelNoteButton" type="button">취소</button>
          <button class="primary" id="saveNoteButton" type="button">저장</button>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "closing-trade-checklist-v2";
      const STATUS_ORDER = ["", "O", "X"];

      const INDEX_ITEMS = [
        {
          id: "idx-daily-ma-20-60-120",
          group: "지수",
          category: "이평선",
          title: "[일봉] 20-60-120 정배열",
        },
        {
          id: "idx-foreign-net-buy",
          group: "지수",

      const state = loadState();
      let activeNote = null;

      init();

      function init() {
        dom.topDateInput.value = state.selectedDate || todayIso();
        dom.symbolInput.value = state.selectedSymbol || "";

        bindEvents();
        render();
      }

      function bindEvents() {
        dom.topDateInput.addEventListener("change", () => {
          setSelectedDate(dom.topDateInput.value || todayIso());
        });

        dom.topDateLabel.addEventListener("click", openDatePicker);

        dom.prevDateButton.addEventListener("click", () => {
          shiftSelectedDate(-1);
        });

        dom.nextDateButton.addEventListener("click", () => {
          shiftSelectedDate(1);
        });

        dom.symbolInput.addEventListener("input", () => {
          const value = dom.symbolInput.value.trim();
          state.selectedSymbol = value;
          const exactStock = findExactStock(value);
          state.selectedCode = exactStock && normalizeSearchText(exactStock.name) === normalizeSearchText(value)
            ? exactStock.code
            : "";
          saveState();
          render();
        });

        dom.symbolInput.addEventListener("focus", () => {
          renderStockSuggestions(dom.symbolInput.value);
        });

        dom.symbolInput.addEventListener("change", () => {
          rememberSymbol(state.selectedSymbol);
          saveState();
          renderSymbolChips();
        });

        document.addEventListener("click", (event) => {
          if (!event.target.closest(".symbol-field")) {
            hideStockSuggestions();
          }
        });

        dom.dayMemo.addEventListener("input", () => {
          getDayState().memo = dom.dayMemo.value;
          saveState();
        });

        dom.indexTableBody.addEventListener("click", handleTableClick);
        dom.stockTableBody.addEventListener("click", handleTableClick);

        dom.resetButton.addEventListener("click", () => {
          if (!window.confirm("현재 날짜와 종목의 체크 내용을 모두 초기화할까요?")) {
            return;
          }
          resetIndexState();
          resetStockState();
          getDayState().memo = "";
          saveState();
          render();
        });

        dom.resetIndexButton.addEventListener("click", () => {
          if (!window.confirm("선택한 날짜의 지수 체크리스트를 초기화할까요?")) {
            return;
          }
          resetIndexState();
          saveState();
          render();
        });

        dom.resetStockButton.addEventListener("click", () => {
          if (!window.confirm("선택한 날짜와 종목의 체크리스트를 초기화할까요?")) {
            return;
          }
          resetStockState();
          saveState();
          render();
        });

        dom.jsonBackupButton.addEventListener("click", exportJsonBackup);
        dom.jsonImportButton.addEventListener("click", () => dom.jsonImportInput.click());
        dom.jsonImportInput.addEventListener("change", importJsonBackup);
        dom.excelExportButton.addEventListener("click", exportExcelWorkbook);

        dom.decisionButtons.forEach((button) => {
          button.addEventListener("click", () => {
            const stockState = getStockState();
            stockState.decision = stockState.decision === button.dataset.decision ? "" : button.dataset.decision;
            saveState();
            render();
          });
        });

        dom.navButtons.forEach((button) => {
          button.addEventListener("click", () => {
            document.getElementById(button.dataset.target)?.scrollIntoView({
              behavior: "smooth",
              block: "start",
            });
            dom.navButtons.forEach((item) => item.classList.toggle("is-active", item === button));
          });
        });

        dom.saveNoteButton.addEventListener("click", saveNote);
        dom.cancelNoteButton.addEventListener("click", closeNoteModal);
        dom.deleteNoteButton.addEventListener("click", deleteNote);
        dom.noteModal.addEventListener("click", (event) => {
          if (event.target === dom.noteModal) {
            closeNoteModal();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && dom.noteModal.classList.contains("is-active")) {
            closeNoteModal();
          }
        });
      }

      function render() {
        ensureCurrentState();
        dom.topDateInput.value = state.selectedDate;
        dom.topDateLabel.textContent = formatDateNav(state.selectedDate);
        renderSymbolChips();
        renderSelectedStock();
        renderStockSwitcher();
        renderStockSuggestions(dom.symbolInput.value);
        dom.dayMemo.value = getDayState().memo || "";
        renderTable(dom.indexTableBody, "index", INDEX_ITEMS, getIndexState());
        renderTable(dom.stockTableBody, "stock", STOCK_ITEMS, getStockState());
        renderDecision();
      }

      function setSelectedDate(date) {
        state.selectedDate = date || todayIso();
        saveState();
        render();
      }

      function shiftSelectedDate(offset) {
        setSelectedDate(addDaysToIso(state.selectedDate || todayIso(), offset));
      }

      function openDatePicker() {
        try {
          if (typeof dom.topDateInput.showPicker === "function") {
            dom.topDateInput.showPicker();
            return;
          }
        } catch (error) {
          // 일부 브라우저는 showPicker를 지원해도 호출 조건이 맞지 않으면 예외가 납니다.
        }
        dom.topDateInput.focus();
        dom.topDateInput.click();
      }

      function renderSymbolChips() {
        const symbols = state.recentSymbols.filter(Boolean).slice(0, 8);
        dom.symbolChips.innerHTML = "";
        symbols.forEach((symbol) => {
          const button = document.createElement("button");
          button.className = "chip";
          button.type = "button";
          button.textContent = symbol;
          button.addEventListener("click", () => {
            rememberCurrentSymbol();
            const exactStock = findExactStock(symbol);
            state.selectedSymbol = symbol;
            state.selectedCode = exactStock ? exactStock.code : "";
            dom.symbolInput.value = symbol;
            saveState();
            render();
          });
          dom.symbolChips.appendChild(button);
        });
      }

      function renderSelectedStock() {
        const exactStock = findExactStock(state.selectedSymbol);
        const selectedStock = state.selectedCode
          ? STOCK_CANDIDATES.find((stock) => stock.code === state.selectedCode)
          : exactStock;
        const symbol = currentSymbol();

        if (symbol !== "종목 미입력") {
          dom.stockTitleName.textContent = `(${selectedStock?.name || symbol})`;
        } else {
          dom.stockTitleName.textContent = "";
        }

        if (selectedStock && normalizeSearchText(selectedStock.name) === normalizeSearchText(state.selectedSymbol)) {
          dom.selectedStockLabel.hidden = false;
          dom.selectedStockLabel.textContent = `선택: ${selectedStock.name} · ${selectedStock.code}`;
          return;
        }

        dom.selectedStockLabel.hidden = true;
        dom.selectedStockLabel.textContent = "";
      }

      function renderStockSwitcher() {
        const day = getDayState();
        const current = currentSymbol();
        const symbols = [...new Set([...Object.keys(day.stocks || {}), ...state.recentSymbols])]
          .filter((symbol) => symbol && symbol !== "종목 미입력")
          .filter((symbol) => (
            symbol === current
            || hasStockData(day.stocks[symbol])
            || findExactStock(symbol)
            || state.recentSymbols.includes(symbol)
          ))
          .sort((left, right) => left.localeCompare(right, "ko-KR"));

        dom.stockSwitchChips.innerHTML = "";
        dom.stockSwitcher.hidden = symbols.length === 0;

        symbols.forEach((symbol) => {
          const button = document.createElement("button");
          button.className = `stock-switch-chip ${symbol === current ? "is-active" : ""}`;
          button.type = "button";
          button.textContent = stockLabelForChip(symbol);
          button.addEventListener("click", () => switchStock(symbol));
          dom.stockSwitchChips.appendChild(button);
        });
      }

      function switchStock(symbol) {
        rememberCurrentSymbol();
        const exactStock = findExactStock(symbol);
        state.selectedSymbol = symbol;
        state.selectedCode = exactStock ? exactStock.code : "";
        dom.symbolInput.value = symbol;
        rememberSymbol(symbol);
        saveState();
        render();
      }

      function renderStockSuggestions(query) {
        const suggestions = getStockSuggestions(query);
        dom.stockSuggestions.innerHTML = "";

        if (!suggestions.length || document.activeElement !== dom.symbolInput) {
          hideStockSuggestions();
          return;
        }

        suggestions.forEach((stock) => {
          const button = document.createElement("button");
          button.className = "stock-option";
          button.type = "button";
          button.innerHTML = `
            <span class="stock-name">${escapeHtml(stock.name)}</span>
            <span class="stock-code">${escapeHtml(stock.code)}</span>
          `;
          button.addEventListener("mousedown", (event) => event.preventDefault());
          button.addEventListener("click", () => selectStock(stock));
          dom.stockSuggestions.appendChild(button);
        });

        dom.stockSuggestions.hidden = false;
      }

      function hideStockSuggestions() {
        dom.stockSuggestions.hidden = true;
      }

      function selectStock(stock) {
        rememberCurrentSymbolUnlessTypingFor(stock);
        state.selectedSymbol = stock.name;
        state.selectedCode = stock.code;
        dom.symbolInput.value = stock.name;
        rememberSymbol(stock.name);
        saveState();
        render();
        hideStockSuggestions();
      }

      function exportJsonBackup() {
        ensureCurrentState();
        const backup = {
          app: "종가매매 체크리스트",
          version: 1,
          exportedAt: new Date().toISOString(),
          state,
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], {
          type: "application/json;charset=utf-8",
        });
        downloadBlob(blob, `종가매매_체크리스트_백업_${todayIso()}.json`);
      }

      function importJsonBackup(event) {
        const file = event.target.files?.[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            const nextState = normalizeImportedState(parsed);
            if (!window.confirm("현재 저장된 내용을 JSON 백업 파일 내용으로 바꿀까요?")) {
              return;
            }
            replaceState(nextState);
            saveState();
            dom.symbolInput.value = state.selectedSymbol || "";
            render();
            window.alert("JSON 불러오기가 완료되었습니다.");
          } catch (error) {
            window.alert("JSON 파일을 불러오지 못했습니다. 백업 파일인지 확인해주세요.");
          } finally {
            dom.jsonImportInput.value = "";
          }
        };
        reader.onerror = () => {
          dom.jsonImportInput.value = "";
          window.alert("JSON 파일을 읽지 못했습니다.");
        };
        reader.readAsText(file, "utf-8");
      }

      function exportExcelWorkbook() {
        ensureCurrentState();
        const workbookXml = buildExcelWorkbookXml();
        const blob = new Blob(["\ufeff", workbookXml], {
          type: "application/vnd.ms-excel;charset=utf-8",
        });
        downloadBlob(blob, `종가매매_체크리스트_${todayIso()}.xls`);
      }

      function buildExcelWorkbookXml() {
        const usedSheetNames = new Set();
        const worksheets = getExportDates()
          .map((date) => buildExcelWorksheet(date, usedSheetNames))
          .join("");

        return `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:x="urn:schemas-microsoft-com:office:excel"
  xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:html="http://www.w3.org/TR/REC-html40">
  <Styles>
    <Style ss:ID="Default" ss:Name="Normal">
      <Alignment ss:Vertical="Center" ss:WrapText="1"/>
      <Font ss:FontName="맑은 고딕" ss:Size="10"/>
    </Style>
    <Style ss:ID="Title">
      <Alignment ss:Vertical="Center" ss:WrapText="1"/>
      <Font ss:FontName="맑은 고딕" ss:Size="14" ss:Bold="1"/>
      <Interior ss:Color="#DBEAFE" ss:Pattern="Solid"/>
    </Style>
    <Style ss:ID="Section">
      <Alignment ss:Vertical="Center" ss:WrapText="1"/>
      <Font ss:FontName="맑은 고딕" ss:Size="11" ss:Bold="1"/>
      <Interior ss:Color="#F1F5F9" ss:Pattern="Solid"/>
    </Style>
    <Style ss:ID="Header">
      <Alignment ss:Horizontal="Center" ss:Vertical="Center" ss:WrapText="1"/>
      <Font ss:FontName="맑은 고딕" ss:Size="10" ss:Bold="1"/>
      <Interior ss:Color="#E2E8F0" ss:Pattern="Solid"/>
      <Borders>
        <Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#CBD5E1"/>
      </Borders>
    </Style>
    <Style ss:ID="Cell">
      <Alignment ss:Vertical="Center" ss:WrapText="1"/>
      <Borders>
        <Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#E2E8F0"/>
      </Borders>
    </Style>
  </Styles>
  ${worksheets}
</Workbook>`;
      }

      function buildExcelWorksheet(date, usedSheetNames) {
        const day = normalizeDayState(state.days[date]);
        const rows = [
          excelRow([{ value: `${formatDisplayDate(date)} 체크리스트`, style: "Title", merge: 4 }]),
          excelRow([
            { value: "시장 요약", style: "Header" },
            { value: day.memo || "", style: "Cell", merge: 3 },
          ]),
          "<Row/>",
          excelRow([{ value: "지수 체크리스트", style: "Section", merge: 4 }]),
          checklistHeaderRow(),
          ...checklistRows(INDEX_ITEMS, normalizeChecklistState(day.index)),
        ];

        Object.entries(day.stocks || {})
          .sort(([left], [right]) => left.localeCompare(right, "ko-KR"))
          .forEach(([symbol, stockValue]) => {
            const stockState = normalizeStockState(stockValue, symbol);
            rows.push("<Row/>");
            rows.push(excelRow([{ value: `종목 체크리스트 - ${stockLabelForExport(symbol)}`, style: "Section", merge: 4 }]));
            rows.push(excelRow([
              { value: "최종 판단", style: "Header" },
              { value: stockState.decision || "", style: "Cell", merge: 3 },
            ]));
            rows.push(checklistHeaderRow());
            rows.push(...checklistRows(STOCK_ITEMS, stockState));
          });

        return `
  <Worksheet ss:Name="${escapeXml(uniqueSheetName(date, usedSheetNames))}">
    <Table>
      <Column ss:Width="70"/>
      <Column ss:Width="90"/>
      <Column ss:Width="260"/>
      <Column ss:Width="55"/>
      <Column ss:Width="220"/>
      ${rows.join("")}
    </Table>
  </Worksheet>`;
      }

      function checklistHeaderRow() {
        return excelRow([
          { value: "구분", style: "Header" },
          { value: "항목", style: "Header" },
          { value: "내용", style: "Header" },
          { value: "확인", style: "Header" },
          { value: "비고", style: "Header" },
        ]);
      }

      function checklistRows(items, bucket) {
        return items.map((item) => excelRow([
          { value: item.group, style: "Cell" },
          { value: item.category, style: "Cell" },
          { value: item.title, style: "Cell" },
          { value: bucket.statuses[item.id] || "", style: "Cell" },
          { value: bucket.notes[item.id] || "", style: "Cell" },
        ]));
      }

      function excelRow(cells) {
        return `<Row>${cells.map(excelCell).join("")}</Row>`;
      }

      function excelCell(cell) {
        const style = cell.style ? ` ss:StyleID="${cell.style}"` : "";
        const merge = cell.merge ? ` ss:MergeAcross="${cell.merge}"` : "";
        const value = cell.value == null ? "" : cell.value;
        return `<Cell${style}${merge}><Data ss:Type="String">${escapeXml(value)}</Data></Cell>`;
      }

      function getExportDates() {
        const dates = [...new Set([state.selectedDate, ...Object.keys(state.days || {})])]
          .filter(Boolean)
          .sort((left, right) => left.localeCompare(right));
        return dates.length ? dates : [todayIso()];
      }

      function uniqueSheetName(date, usedSheetNames) {
        const base = String(date || "Sheet")
          .replace(/[\\\/?*\[\]\:]/g, " ")
          .trim()
          .slice(0, 31) || "Sheet";
        let name = base;
        let count = 2;
        while (usedSheetNames.has(name)) {
          const suffix = ` ${count}`;
          name = `${base.slice(0, 31 - suffix.length)}${suffix}`;
          count += 1;
        }
        usedSheetNames.add(name);
        return name;
      }

      function stockLabelForExport(symbol) {
        const stock = findExactStock(symbol);
        return stock ? `${stock.name} (${stock.code})` : symbol;
      }

      function stockLabelForChip(symbol) {
        const stock = findExactStock(symbol);
        return stock ? stock.name : symbol;
      }

      function hasStockData(value) {
        const stock = normalizeStockState(value, "");
        return Object.keys(stock.statuses).length > 0
          || Object.keys(stock.notes).length > 0
          || Boolean(stock.decision);
      }

      function normalizeImportedState(value) {
        const source = isPlainObject(value?.state) ? value.state : value;
        return {
          selectedDate: typeof source?.selectedDate === "string" ? source.selectedDate : todayIso(),
          selectedSymbol: typeof source?.selectedSymbol === "string" ? source.selectedSymbol : "",
          selectedCode: typeof source?.selectedCode === "string" ? source.selectedCode : "",
          recentSymbols: Array.isArray(source?.recentSymbols)
            ? source.recentSymbols.filter((item) => typeof item === "string")
            : [],
          days: isPlainObject(source?.days) ? source.days : {},
        };
      }

      function replaceState(nextState) {
        Object.keys(state).forEach((key) => delete state[key]);
        Object.assign(state, nextState);
        ensureCurrentState();
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function renderTable(container, kind, items, bucket) {
        const groupSpans = countSpans(items, "group");
        const categorySpans = countSpans(items, "category");
        const seenGroups = new Set();
        const seenCategories = new Set();

        container.innerHTML = items
          .map((item) => {
            const status = bucket.statuses[item.id] || "";
            const note = bucket.notes[item.id] || "";
            const groupKey = item.group;
            const categoryKey = `${item.group}|${item.category}`;
            const groupCell = seenGroups.has(groupKey)
              ? ""
              : `<td class="group-cell" rowspan="${groupSpans.get(groupKey)}">${escapeHtml(item.group)}</td>`;
            const categoryCell = seenCategories.has(categoryKey)
              ? ""
              : `<td class="category-cell" rowspan="${categorySpans.get(categoryKey)}">${escapeHtml(item.category)}</td>`;

            seenGroups.add(groupKey);
            seenCategories.add(categoryKey);

            return `
              <tr>
                ${groupCell}
                ${categoryCell}
                <td class="content-cell">
                  <span class="content-main">${escapeHtml(item.title)}</span>
                </td>
                <td>
                  <button class="status-button ${status ? "" : "is-empty"} ${status === "O" ? "is-ok" : ""} ${status === "X" ? "is-no" : ""}" type="button" data-kind="${kind}" data-id="${escapeHtml(item.id)}" data-action="status" aria-label="${escapeHtml(item.title)} 확인 상태 변경">${status || ""}</button>
                </td>
                <td>
                  <button class="note-button ${note ? "has-note" : ""}" type="button" data-kind="${kind}" data-id="${escapeHtml(item.id)}" data-action="note" aria-label="${escapeHtml(item.title)} 비고 입력">${note ? "보기" : "입력"}</button>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      function handleTableClick(event) {
        const button = event.target.closest("[data-action][data-kind][data-id]");
        if (!button) {
          return;
        }

        const kind = button.dataset.kind;
        const id = button.dataset.id;
        if (button.dataset.action === "status") {
          cycleStatus(kind, id);
          return;
        }

        openNoteModal(kind, id);
      }

      function cycleStatus(kind, id) {
        const bucket = kind === "index" ? getIndexState() : getStockState();
        const current = bucket.statuses[id] || "";
        const next = STATUS_ORDER[(STATUS_ORDER.indexOf(current) + 1) % STATUS_ORDER.length];
        if (next) {
          bucket.statuses[id] = next;
        } else {
          delete bucket.statuses[id];
        }
        saveState();
        render();
      }

      function openNoteModal(kind, id) {
        const item = [...INDEX_ITEMS, ...STOCK_ITEMS].find((entry) => entry.id === id);
        const bucket = kind === "index" ? getIndexState() : getStockState();
        activeNote = { kind, id };
        dom.noteModalTitle.textContent = item?.title || "비고 입력";
        dom.noteModalDesc.textContent = kind === "index"
          ? `${formatDisplayDate(state.selectedDate)} 지수 체크 메모`
          : `${formatDisplayDate(state.selectedDate)} · ${currentStockLabel()} 메모`;
        dom.noteInput.value = bucket.notes[id] || "";
        dom.noteModal.classList.add("is-active");
        document.body.style.overflow = "hidden";
        window.setTimeout(() => dom.noteInput.focus(), 60);
      }

      function closeNoteModal() {
        activeNote = null;
        dom.noteModal.classList.remove("is-active");
        document.body.style.overflow = "";
      }

      function saveNote() {
        if (!activeNote) {
          return;
        }

        const bucket = activeNote.kind === "index" ? getIndexState() : getStockState();
        const text = dom.noteInput.value.trim();
        if (text) {
          bucket.notes[activeNote.id] = text;
        } else {
          delete bucket.notes[activeNote.id];
        }
        saveState();
        closeNoteModal();
        render();
      }

      function deleteNote() {
        if (!activeNote) {
          return;
        }

        const bucket = activeNote.kind === "index" ? getIndexState() : getStockState();
        delete bucket.notes[activeNote.id];
        saveState();
        closeNoteModal();
        render();
      }

      function renderDecision() {
        const decision = getStockState().decision || "";
        dom.decisionButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.decision === decision);
        });
      }

      function ensureCurrentState() {
        state.selectedDate = state.selectedDate || todayIso();
        state.days[state.selectedDate] = normalizeDayState(state.days[state.selectedDate]);
        const symbol = currentSymbol();
        const day = getDayState();
        day.stocks[symbol] = normalizeStockState(day.stocks[symbol], symbol);
      }

      function getDayState() {
        state.days[state.selectedDate] = normalizeDayState(state.days[state.selectedDate]);
        return state.days[state.selectedDate];
      }

      function getIndexState() {
        const day = getDayState();
        day.index = normalizeChecklistState(day.index);
        return day.index;
      }

      function getStockState() {
        const day = getDayState();
        const symbol = currentSymbol();
        day.stocks[symbol] = normalizeStockState(day.stocks[symbol], symbol);
        return day.stocks[symbol];
      }

      function resetIndexState() {
        getDayState().index = createChecklistState();
      }

      function resetStockState() {
        getDayState().stocks[currentSymbol()] = createStockState(currentSymbol());
      }

      function currentSymbol() {
        return (state.selectedSymbol || "").trim() || "종목 미입력";
      }

      function currentStockLabel() {
        const symbol = currentSymbol();
        const exactStock = findExactStock(symbol);
        const code = state.selectedCode || (
          exactStock && normalizeSearchText(exactStock.name) === normalizeSearchText(symbol) ? exactStock.code : ""
        );
        if (code && symbol !== "종목 미입력") {
          return `${symbol} · ${code}`;
        }
        return symbol;
      }

      function rememberSymbol(symbol) {
        const safeSymbol = (symbol || "").trim();
        if (!safeSymbol) {
          return;
        }
        state.recentSymbols = [safeSymbol, ...state.recentSymbols.filter((item) => item !== safeSymbol)].slice(0, 12);
      }

      function rememberCurrentSymbol() {
        const symbol = currentSymbol();
        if (!symbol || symbol === "종목 미입력") {
          return;
        }
        const day = getDayState();
        day.stocks[symbol] = normalizeStockState(day.stocks[symbol], symbol);
        rememberSymbol(symbol);
      }

      function rememberCurrentSymbolUnlessTypingFor(stock) {
        const symbol = currentSymbol();
        if (isQueryForStock(symbol, stock)) {
          return;
        }
        rememberCurrentSymbol();
      }

      function isQueryForStock(query, stock) {
        const needle = normalizeSearchText(query);
        if (!needle || !stock) {
          return false;
        }
        const targets = [stock.name, stock.code, ...(stock.aliases || [])].map(normalizeSearchText);
        return targets.some((target) => target.includes(needle));
      }

      function getStockSuggestions(query) {
        const needle = normalizeSearchText(query);
        if (!needle) {
          return [];
        }

        return STOCK_CANDIDATES.map((stock) => ({
          ...stock,
          score: scoreStock(stock, needle),
        }))
          .filter((stock) => stock.score < 99)
          .sort((left, right) => left.score - right.score || left.name.localeCompare(right.name, "ko-KR"))
          .slice(0, 7);
      }

      function scoreStock(stock, needle) {
        const targets = [stock.name, stock.code, ...(stock.aliases || [])].map(normalizeSearchText);
        if (targets.some((target) => target === needle)) {
          return 0;
        }
        if (targets.some((target) => target.startsWith(needle))) {
          return 1;
        }
        if (targets.some((target) => target.includes(needle))) {
          return 2;
        }
        return 99;
      }

      function findExactStock(value) {
        const needle = normalizeSearchText(value);
        if (!needle) {
          return null;
        }
        return STOCK_CANDIDATES.find((stock) => {
          const targets = [stock.name, stock.code, ...(stock.aliases || [])].map(normalizeSearchText);
          return targets.includes(needle);
        }) || null;
      }

      function normalizeSearchText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/\s+/g, "")
          .replace(/[()]/g, "");
      }

      function createChecklistState() {
        return {
          statuses: {},
          notes: {},
        };
      }

      function createStockState(symbol) {
        return {
          symbol,
          statuses: {},
          notes: {},
          decision: "",
        };
      }

      function normalizeChecklistState(value) {
        return {
          statuses: isPlainObject(value?.statuses) ? value.statuses : {},
          notes: isPlainObject(value?.notes) ? value.notes : {},
        };
      }

      function normalizeStockState(value, symbol) {
        const base = normalizeChecklistState(value);
        return {
          symbol,
          statuses: base.statuses,
          notes: base.notes,
          decision: typeof value?.decision === "string" ? value.decision : "",
        };
      }

      function normalizeDayState(value) {
        const day = isPlainObject(value) ? value : {};
        return {
          memo: typeof day.memo === "string" ? day.memo : "",
          index: normalizeChecklistState(day.index),
          stocks: isPlainObject(day.stocks) ? day.stocks : {},
        };
      }

      function countSpans(items, key) {
        const map = new Map();
        items.forEach((item) => {
          const groupKey = key === "category" ? `${item.group}|${item.category}` : item[key];
          map.set(groupKey, (map.get(groupKey) || 0) + 1);
        });
        return map;
      }

      function todayIso() {
        return new Date().toLocaleDateString("sv-SE");
      }

      function addDaysToIso(isoDate, offset) {
        const date = new Date(`${isoDate || todayIso()}T00:00:00`);
        if (Number.isNaN(date.getTime())) {
          return todayIso();
        }
        date.setDate(date.getDate() + offset);
        return date.toLocaleDateString("sv-SE");
      }

      function formatDateNav(isoDate) {
        const date = new Date(`${isoDate}T00:00:00`);
        if (Number.isNaN(date.getTime())) {
          return isoDate || "날짜 없음";
        }
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}.${month}.${day}`;
      }

      function formatDisplayDate(isoDate) {
        const date = new Date(`${isoDate}T00:00:00`);
        if (Number.isNaN(date.getTime())) {
          return isoDate || "날짜 없음";
        }
        return new Intl.DateTimeFormat("ko-KR", {
          month: "short",
          day: "numeric",
          weekday: "short",
        }).format(date);
      }

      function isPlainObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeXml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
      }

      function loadState() {
        try {
          const parsed = JSON.parse(window.localStorage.getItem(STORAGE_KEY) || "{}");
          return {
            selectedDate: typeof parsed.selectedDate === "string" ? parsed.selectedDate : todayIso(),
            selectedSymbol: typeof parsed.selectedSymbol === "string" ? parsed.selectedSymbol : "",
            selectedCode: typeof parsed.selectedCode === "string" ? parsed.selectedCode : "",
            recentSymbols: Array.isArray(parsed.recentSymbols) ? parsed.recentSymbols : [],
            days: isPlainObject(parsed.days) ? parsed.days : {},
          };
        } catch (error) {
          return {
            selectedDate: todayIso(),
            selectedSymbol: "",
            selectedCode: "",
            recentSymbols: [],
            days: {},
          };
        }
      }

      function saveState() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
    </script>
  </body>
</html>
